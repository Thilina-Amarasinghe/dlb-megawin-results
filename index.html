<!DOCTYPE html>
<html lang="si">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>DLB Welfare Society - Raffle Draw</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #05997e 0%, #0600ab 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      max-width: 1100px;
      width: 100%;
    }

    /* Professional Header Card - Centered with Large Logo */
    .header-card {
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 60px;
      padding: 50px 40px;
      box-shadow: 0 30px 60px -20px rgba(0,20,40,0.4),
                  inset 0 1px 2px rgba(255,255,255,0.8);
      border: 1px solid rgba(255,255,255,0.4);
      transition: all 0.3s ease;
      animation: fadeSlideUp 0.8s ease-out;
    }

    .header-card:hover {
      box-shadow: 0 40px 70px -20px rgba(0,30,60,0.5);
    }

    .header-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 25px;
    }

    /* Logo Section - Larger */
    .logo-wrapper {
      background: white;
      border-radius: 40px;
      padding: 25px 40px;
      box-shadow: 0 20px 30px -12px rgba(0,0,0,0.2);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 3px solid rgba(255,215,0,0.4);
      max-width: 90%;
    }

    .logo-img {
      height: 130px;
      width: auto;
      max-width: 100%;
      object-fit: contain;
    }

    /* Title Section - Centered */
    .title-section {
      width: 100%;
    }

    .date-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0a1f44, #142b56);
      color: white;
      padding: 15px 45px;
      border-radius: 70px;
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: 3px;
      box-shadow: 0 15px 25px -8px rgba(0,30,70,0.6);
      border: 2px solid rgba(255,215,0,0.5);
      margin: 10px auto;
    }

    .date-badge::before {
      content: '📅';
      margin-right: 18px;
      font-size: 2.5rem;
      filter: drop-shadow(0 3px 4px gold);
    }

    .society-name {
      font-size: 2rem;
      font-weight: 600;
      color: #2a3f6e;
      margin-top: 15px;
      background: rgba(255,255,255,0.3);
      padding: 10px 30px;
      border-radius: 60px;
      display: inline-block;
      backdrop-filter: blur(4px);
    }

    .society-name strong {
      color: #c5a028;
      font-weight: 700;
      font-size: 2.2rem;
    }

    /* Animation */
    @keyframes fadeSlideUp {
      0% { opacity: 0; transform: translateY(30px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* Responsive */
    @media (max-width: 800px) {
      .header-card {
        padding: 40px 25px;
        border-radius: 50px;
      }
      .logo-wrapper {
        padding: 20px 30px;
      }
      .logo-img {
        height: 100px;
      }
      .date-badge {
        font-size: 2rem;
        padding: 12px 35px;
      }
      .date-badge::before {
        font-size: 2rem;
      }
      .society-name {
        font-size: 1.6rem;
      }
      .society-name strong {
        font-size: 1.8rem;
      }
    }

    @media (max-width: 480px) {
      .header-card {
        padding: 30px 15px;
        border-radius: 40px;
      }
      .logo-wrapper {
        padding: 15px 20px;
      }
      .logo-img {
        height: 70px;
      }
      .date-badge {
        font-size: 1.5rem;
        padding: 10px 20px;
      }
      .date-badge::before {
        font-size: 1.5rem;
        margin-right: 10px;
      }
      .society-name {
        font-size: 1.2rem;
        padding: 8px 20px;
      }
      .society-name strong {
        font-size: 1.4rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header-card">
      <div class="header-container">
        <!-- Large Logo - Centered -->
        <div class="logo-wrapper">
          <img src="images/logo.png" alt="DLB Welfare Society Logo" class="logo-img" onerror="this.src='https://via.placeholder.com/300x130?text=DLB+Logo'">
        </div>

        <!-- Date and Society Name - Centered -->
        <div class="title-section">
          <div class="date-badge">
            2026.03.01
          </div>
          <div class="society-name">
            <strong>DLB</strong> Welfare Society
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>

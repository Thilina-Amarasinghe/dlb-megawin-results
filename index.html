<!DOCTYPE html>
<html lang="si">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DLB Welfare Society - Raffle Draw</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(145deg, #f5f7fa 0%, #e9edf2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* Professional Header Card */
    .header-card {
      max-width: 1100px;
      width: 100%;
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 48px;
      padding: 40px 50px;
      box-shadow: 0 30px 60px -20px rgba(0,20,40,0.3),
                  inset 0 1px 1px rgba(255,255,255,0.8);
      border: 1px solid rgba(255,255,255,0.5);
      transition: all 0.3s ease;
    }

    .header-card:hover {
      box-shadow: 0 40px 70px -20px rgba(0,30,60,0.4);
    }

    .header-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 30px;
    }

    /* Logo Section */
    .logo-wrapper {
      flex: 0 0 auto;
      background: white;
      border-radius: 30px;
      padding: 15px 25px;
      box-shadow: 0 15px 25px -10px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255,215,0,0.3);
    }

    .logo-img {
      height: 90px;
      width: auto;
      max-width: 200px;
      object-fit: contain;
    }

    /* Center Content */
    .title-section {
      flex: 1;
      text-align: center;
    }

    .society-name {
      font-size: 1.8rem;
      font-weight: 600;
      color: #1a2b4c;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    .society-name span {
      color: #c5a028;
      font-weight: 700;
    }

    .date-badge {
      display: inline-flex;
      align-items: center;
      background: linear-gradient(135deg, #1e2b4a, #14223c);
      color: white;
      padding: 10px 30px;
      border-radius: 60px;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 2px;
      box-shadow: 0 10px 20px -5px rgba(0,20,50,0.4);
      border: 1px solid rgba(255,215,0,0.3);
      margin-top: 5px;
    }

    .date-badge::before {
      content: '📅';
      margin-right: 15px;
      font-size: 2rem;
      filter: drop-shadow(0 2px 2px gold);
    }

    /* Right Decoration */
    .draw-number {
      flex: 0 0 auto;
      background: rgba(255,255,255,0.5);
      backdrop-filter: blur(5px);
      border-radius: 100px;
      padding: 12px 25px;
      border: 1px solid rgba(255,215,0,0.4);
      color: #1e2b4a;
      font-weight: 600;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .draw-number span {
      background: #c5a028;
      color: white;
      padding: 5px 15px;
      border-radius: 40px;
      font-size: 1.4rem;
      font-weight: 700;
    }

    /* Responsive */
    @media (max-width: 800px) {
      .header-card {
        padding: 30px 25px;
      }
      .header-container {
        flex-direction: column;
        text-align: center;
      }
      .logo-img {
        height: 70px;
      }
      .date-badge {
        font-size: 1.6rem;
        padding: 8px 20px;
      }
    }

    @media (max-width: 480px) {
      .header-card {
        border-radius: 30px;
        padding: 25px 15px;
      }
      .society-name {
        font-size: 1.4rem;
      }
      .date-badge {
        font-size: 1.3rem;
        padding: 6px 15px;
      }
      .date-badge::before {
        font-size: 1.5rem;
        margin-right: 8px;
      }
      .draw-number {
        font-size: 1rem;
        padding: 8px 15px;
      }
      .draw-number span {
        font-size: 1.2rem;
        padding: 3px 10px;
      }
    }

    /* Optional fade-in animation */
    .header-card {
      animation: fadeSlideUp 0.8s ease-out;
    }

    @keyframes fadeSlideUp {
      0% { opacity: 0; transform: translateY(30px); }
      100% { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="header-card">
    <div class="header-container">
      <!-- Logo Section -->
      <div class="logo-wrapper">
        <img src="images/logo.png" alt="DLB Welfare Society Logo" class="logo-img" onerror="this.src='https://via.placeholder.com/200x90?text=DLB+Logo'">
      </div>

      <!-- Center Title & Date -->
      <div class="title-section">
        <div class="society-name">
          <span>DLB</span> Welfare Society
        </div>
        <div class="date-badge">
          2026.03.01
        </div>
      </div>

      <!-- Right Side (Optional) -->
      <div class="draw-number">
        <span>#001</span> Grand Draw
      </div>
    </div>
  </div>

  <!-- (මෙතනින් පස්සේ ඔයාගේ result tables එකතු කරන්න) -->
</body>
</html>

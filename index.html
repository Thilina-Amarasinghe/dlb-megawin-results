<!DOCTYPE html>
<html lang="si">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>DLB Welfare Society - Raffle Draw</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #05997e 0%, #0600ab 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      width: 100%;
    }

    /* Transparent Glass Card */
    .header-card {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 60px;
      padding: 50px 40px;
      box-shadow: 0 30px 50px -20px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.25);
      transition: all 0.3s ease;
      animation: fadeSlideUp 0.8s ease-out;
    }

    .header-card:hover {
      box-shadow: 0 40px 70px -20px rgba(0, 0, 0, 0.7);
      border-color: rgba(255, 215, 0, 0.3);
    }

    /* Vertical Stack - Center All */
    .header-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 30px;
    }

    /* Megawin Raffle Draw - Top */
    .raffle-title {
      font-size: 2.5rem;
      font-weight: 700;
      color: white;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
      letter-spacing: 1px;
      background: linear-gradient(135deg, #fff5d6, #ffd700);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 5px;
    }

    .raffle-title span {
      font-weight: 800;
      color: #ffd700;
      text-shadow: 0 0 10px rgba(255,215,0,0.5);
    }

    /* Draw Date - Second */
    .date-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(10, 31, 68, 0.7);
      backdrop-filter: blur(4px);
      color: white;
      padding: 12px 40px;
      border-radius: 70px;
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: 3px;
      box-shadow: 0 15px 25px -8px rgba(0,0,0,0.4);
      border: 2px solid rgba(255, 215, 0, 0.5);
      margin: 5px 0;
    }

    .date-badge::before {
      content: '📅';
      margin-right: 15px;
      font-size: 2rem;
      filter: drop-shadow(0 2px 5px gold);
    }

    /* Logo - Third (No White Box) */
    .logo-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px 0;
    }

    .logo-img {
      height: 140px;
      width: auto;
      max-width: 100%;
      object-fit: contain;
      filter: drop-shadow(0 10px 15px rgba(0,0,0,0.3));
    }

    /* DLB Welfare Society - Bottom */
    .society-name {
      font-size: 2.2rem;
      font-weight: 600;
      color: white;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
      letter-spacing: 1px;
      background: rgba(255,255,255,0.1);
      padding: 12px 35px;
      border-radius: 60px;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.2);
    }

    .society-name .dlb {
      color: #ffd700;
      font-weight: 700;
      text-shadow: 0 0 15px rgba(255,215,0,0.6);
    }

    .society-name .welfare {
      color: white;
      font-weight: 500;
    }

    /* Animation */
    @keyframes fadeSlideUp {
      0% { opacity: 0; transform: translateY(30px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* Responsive */
    @media (max-width: 800px) {
      .header-card {
        padding: 40px 25px;
        border-radius: 50px;
      }
      .raffle-title {
        font-size: 2rem;
      }
      .date-badge {
        font-size: 1.8rem;
        padding: 10px 30px;
      }
      .logo-img {
        height: 110px;
      }
      .society-name {
        font-size: 1.8rem;
        padding: 10px 25px;
      }
    }

    @media (max-width: 480px) {
      .header-card {
        padding: 30px 15px;
        border-radius: 40px;
      }
      .raffle-title {
        font-size: 1.6rem;
      }
      .date-badge {
        font-size: 1.4rem;
        padding: 8px 20px;
      }
      .date-badge::before {
        font-size: 1.4rem;
        margin-right: 10px;
      }
      .logo-img {
        height: 80px;
      }
      .society-name {
        font-size: 1.4rem;
        padding: 8px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header-card">
      <div class="header-container">
        <!-- 1. Megawin Raffle Draw -->
        <div class="raffle-title">
          Megawin Raffle Draw
        </div>

        <!-- 2. Draw Date -->
        <div class="date-badge">
          2026.03.01
        </div>

        <!-- 3. Logo (No White Box) -->
        <div class="logo-wrapper">
          <img src="images/logo.png" alt="DLB Welfare Society Logo" class="logo-img" onerror="this.src='https://via.placeholder.com/300x140?text=DLB+Logo'">
        </div>

        <!-- 4. DLB Welfare Society (DLB in Gold, rest in White) -->
        <div class="society-name">
          <span class="dlb">DLB</span> <span class="welfare">Welfare Society</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>

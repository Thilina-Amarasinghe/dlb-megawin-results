<!DOCTYPE html>
<html lang="si">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>DLB Welfare Society - Raffle Draw</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #05997e 0%, #0600ab 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      max-width: 1000px;
      width: 100%;
    }

    /* Transparent Glass Card */
    .header-card {
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 70px;
      padding: 60px 40px;
      box-shadow: 0 30px 60px -20px rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.2);
      transition: all 0.3s ease;
      animation: fadeSlideUp 0.8s ease-out;
    }

    .header-card:hover {
      box-shadow: 0 40px 80px -20px rgba(0, 0, 0, 0.8);
      border-color: rgba(255, 215, 0, 0.3);
    }

    /* Vertical Stack - Center All */
    .header-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 25px;
    }

    /* Raffle Draw Results - Top */
    .raffle-title {
      font-size: 3rem;
      font-weight: 700;
      color: #FFD700;
      text-shadow: 3px 3px 6px rgba(0,0,0,0.4);
      letter-spacing: 1.5px;
      margin-bottom: 5px;
      line-height: 1.2;
    }

    /* Draw Date - Second */
    .date-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(6, 25, 55, 0.8);
      backdrop-filter: blur(4px);
      color: white;
      padding: 15px 45px;
      border-radius: 70px;
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: 4px;
      box-shadow: 0 18px 28px -10px rgba(0,0,0,0.5);
      border: 2px solid #FFD700;
      margin: 5px 0;
    }

    .date-badge::before {
      content: '📅';
      margin-right: 18px;
      font-size: 2.5rem;
      filter: drop-shadow(0 3px 5px #FFD700);
    }

    /* Logo - Third (Larger, No White Box) */
    .logo-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 15px 0 10px;
    }

    .logo-img {
      height: 170px;
      width: auto;
      max-width: 100%;
      object-fit: contain;
      filter: drop-shadow(0 15px 20px rgba(0,0,0,0.4));
    }

    /* DLB Welfare Society - Bottom */
    .society-name {
      font-size: 2.3rem;
      font-weight: 600;
      color: white;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
      letter-spacing: 1px;
      background: rgba(255,255,255,0.08);
      padding: 12px 40px;
      border-radius: 70px;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.15);
    }

    .society-name .dlb {
      color: #FFD700;
      font-weight: 700;
      text-shadow: 0 0 15px rgba(255,215,0,0.6);
    }

    .society-name .welfare {
      color: white;
      font-weight: 500;
    }

    /* Animation */
    @keyframes fadeSlideUp {
      0% { opacity: 0; transform: translateY(30px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* Responsive */
    @media (max-width: 800px) {
      .header-card {
        padding: 50px 30px;
        border-radius: 60px;
      }
      .raffle-title {
        font-size: 2.5rem;
      }
      .date-badge {
        font-size: 2.2rem;
        padding: 12px 35px;
      }
      .logo-img {
        height: 140px;
      }
      .society-name {
        font-size: 2rem;
        padding: 10px 30px;
      }
    }

    @media (max-width: 480px) {
      .header-card {
        padding: 35px 20px;
        border-radius: 50px;
      }
      .raffle-title {
        font-size: 1.8rem;
      }
      .date-badge {
        font-size: 1.6rem;
        padding: 10px 25px;
      }
      .date-badge::before {
        font-size: 1.6rem;
        margin-right: 12px;
      }
      .logo-img {
        height: 100px;
      }
      .society-name {
        font-size: 1.5rem;
        padding: 8px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header-card">
      <div class="header-container">
        <!-- 1. Raffle Draw Results (Gold color) -->
        <div class="raffle-title">
          Raffle Draw Results
        </div>

        <!-- 2. Draw Date -->
        <div class="date-badge">
          2026.03.01
        </div>

        <!-- 3. Logo (Larger, No White Box) -->
        <div class="logo-wrapper">
          <img src="images/logo.png" alt="DLB Welfare Society Logo" class="logo-img" onerror="this.src='https://via.placeholder.com/400x170?text=DLB+Logo'">
        </div>

        <!-- 4. DLB Welfare Society (DLB in Gold, rest in White) -->
        <div class="society-name">
          <span class="dlb">DLB</span> <span class="welfare">Welfare Society</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
